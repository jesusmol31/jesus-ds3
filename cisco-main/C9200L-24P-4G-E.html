<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <script src="./js/nav.js"></script>
  <title>Detalle de Producto | DS3 Comunicaciones</title>
</head>
<body class="bg-gray-50">

  <div id="navbar"></div>

  <main class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <aside class="hidden lg:block w-64">
        <div class="bg-white p-4 rounded-lg shadow-sm border">
          <h3 class="font-bold text-gray-700 mb-4">Categorías</h3>
          <ul class="space-y-2 text-sm text-gray-600">
            <li><a href="#" class="hover:text-blue-600">Switches Cisco</a></li>
            <li><a href="#" class="hover:text-blue-600">Cableado Estructurado</a></li>
            <li><a href="#" class="hover:text-blue-600">Fibra Óptica</a></li>
          </ul>
        </div>
      </aside>

      <div class="flex-1 bg-white p-6 rounded-lg shadow-sm border">
        <div class="flex flex-col md:flex-row gap-8">
          
          <div class="md:w-1/2 bg-gray-50 p-6 rounded-lg flex items-center justify-center border">
            <img src="principal.jpg" alt="Cable AMP 6-1427200-4" class="max-h-[350px] object-contain">
          </div>

          <div class="md:w-1/2">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Cable UTP AMP Categoría 6</h1>
            <p class="text-gray-500 mb-4 font-mono">SKU: 6-1427200-4</p>
            
            <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-600 mb-6">
              <span class="text-3xl font-bold text-blue-600">U$ 187.00</span>
              <p class="text-xs text-blue-800 mt-1">Precio incluye IGV</p>
            </div>

            <button onclick="comprarAhora('6-1427200-4', 'Cable UTP AMP Cat 6')" 
                    class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-2">
              <i class="fas fa-shopping-cart"></i> Comprar ahora
            </button>
          </div>
        </div>

        <div class="mt-10">
          <h2 class="text-lg font-bold border-b pb-2 mb-4">Especificaciones Técnicas</h2>
          <table class="w-full text-sm text-left border-collapse">
            <tr class="border-b">
              <th class="py-2 text-gray-500">Marca</th>
              <td class="py-2">AMP Netconnect / CommScope</td>
            </tr>
            <tr class="border-b">
              <th class="py-2 text-gray-500">Categoría</th>
              <td class="py-2">Categoría 6</td>
            </tr>
            <tr class="border-b">
              <th class="py-2 text-gray-500">Tipo</th>
              <td class="py-2">U/UTP CMR</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    function comprarAhora(sku, detalle) {
      window.open(`https://www.ds3comunicaciones.com/pedido.html?sku=${encodeURIComponent(sku)}&detalle=${encodeURIComponent(detalle)}`, '_blank');
    }
    
    // Cargar navbar (ajusta la ruta según tu estructura)
    fetch('./components/navbar.html')
      .then(response => response.text())
      .then(data => document.getElementById('navbar').innerHTML = data);
  </script>
</body>
</html>
